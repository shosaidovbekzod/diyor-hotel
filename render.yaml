services:
  - type: web
    name: diyor-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: DIYOR HOTEL API
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FIRST_ADMIN_EMAIL
        value: admin@hotel.com
      - key: FIRST_ADMIN_PASSWORD
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

  - type: web
    name: diyor-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: /api/v1
      - key: INTERNAL_API_URL
        sync: false
      - key: BACKEND_ORIGIN
        sync: false
